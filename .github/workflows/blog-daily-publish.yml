name: Daily Blog Publish

on:
  schedule:
    - cron: "17 */4 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force publish now"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Publish one post from queue
        id: publish
        run: |
          if [ "${{ github.event.inputs.force || 'false' }}" = "true" ]; then
            node scripts/blog/publish-from-queue.mjs --force
          else
            node scripts/blog/publish-from-queue.mjs
          fi

      - name: Commit published post
        run: |
          if git diff --quiet; then
            echo "No publish changes to commit"
            exit 0
          fi

          git config user.name "${{ secrets.GH_COMMIT_NAME || vars.GH_COMMIT_NAME || 'mahfuj02' }}"
          git config user.email "${{ secrets.GH_COMMIT_EMAIL || vars.GH_COMMIT_EMAIL || 'mahfuj02@users.noreply.github.com' }}"

          COMMIT_MESSAGE="${{ steps.publish.outputs.commit_message || 'chore(blog): update staged blog workflow state' }}"

          git add data/blog/posts.json data/blog/queue.json data/blog/used-problems.json data/blog/runs.json
          git commit -m "$COMMIT_MESSAGE"
          git push
