name: One-Time 5m Auto Publish Test

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/blog-auto-test-5m.yml

permissions:
  contents: write

jobs:
  delayed-test-publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Wait 5 minutes
        run: sleep 300

      - name: Publish one post (forced)
        run: node scripts/blog/publish-from-queue.mjs --force

      - name: Commit publish result
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "${{ secrets.GH_COMMIT_NAME || vars.GH_COMMIT_NAME || 'mahfuj02' }}"
          git config user.email "${{ secrets.GH_COMMIT_EMAIL || vars.GH_COMMIT_EMAIL || 'mahfuj02@users.noreply.github.com' }}"

          git add data/blog/posts.json data/blog/queue.json data/blog/used-problems.json data/blog/runs.json
          git commit -m "chore(blog): one-time 5m auto publish test"
          git push
